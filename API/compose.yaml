services:
  server:
    build: server
    restart: unless-stopped
    volumes: 
      - ./server:/app
    ports: 
      - 8000:8000
    env_file:
      - project.env
    depends_on:
      - database

  database:
    container_name: wt_database
    image: postgres:latest
    env_file:
      - project.env
    

  database_migrations:
    image: flyway/flyway:latest-alpine
    volumes:
      - ./database_migrations:/flyway/sql
    env_file: 
      - project.env
    depends_on:
      - database
    command: -connectRetries=60 -baselineOnMigrate=true migrate
